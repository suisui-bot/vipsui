name: WeCatalog completeness import

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/wecatalog-completeness-import.yml"
      - "scripts/import_wecatalog_store.py"

permissions:
  contents: write

concurrency:
  group: wecatalog-completeness-import
  cancel-in-progress: false

jobs:
  import-build-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: npm ci

      - name: Run full WeCatalog completeness audit and import
        run: |
          npm run import:wecatalog -- \
            --completeness-audit \
            --discover-categories \
            --no-download-images \
            --workers 40 \
            --expected-source-total 65648

      - name: Publish import reports into app data
        run: |
          cp data/wecatalog/completeness_audit_report.json app/data/completenessAudit.json
          cp data/wecatalog/full_import_report.json app/data/fullImportReport.json
          node - <<'NODE'
          const fs = require("fs");
          const audit = JSON.parse(fs.readFileSync("app/data/completenessAudit.json", "utf8"));
          const catalog = JSON.parse(fs.readFileSync("app/data/catalog.json", "utf8"));
          console.log(JSON.stringify({
            sourceDisplayedTotal: audit.sourceDisplayedTotal,
            sourceApiTotalItemCount: audit.sourceApiTotalItemCount,
            uniqueSourceProductsDiscovered: audit.uniqueSourceProductsDiscovered,
            productsImported: audit.productsImported,
            productsMissing: audit.productsMissing,
            sourceCategoryNodes: audit.sourceCategoryNodes,
            catalogProducts: catalog.stats.totalProducts,
            catalogImages: catalog.stats.totalImages
          }, null, 2));
          if (audit.productsMissing !== 0) {
            throw new Error(`Import is incomplete: ${audit.productsMissing} products missing`);
          }
          if (catalog.stats.totalProducts !== audit.uniqueSourceProductsDiscovered) {
            throw new Error("Catalog product count does not match discovered source product count");
          }
          NODE

      - name: Build production site
        run: npm run build

      - name: Commit generated catalog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/data public/product-shards
          if git diff --cached --quiet; then
            echo "No generated catalog changes to commit."
          else
            git commit -m "complete wecatalog import"
            git push origin main
          fi

      - name: Upload audit reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: wecatalog-import-reports
          path: |
            data/wecatalog/completeness_audit_report.json
            data/wecatalog/full_import_report.json
            data/wecatalog/category_discovery_report.json
            data/wecatalog/source_all_product_scan_report.json
